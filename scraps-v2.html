<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swarf — Emil Blum</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/transitions.css">

  <style>
    /* ── Canvas viewport ── */
    html, body { overflow: hidden; height: 100%; margin: 0; }

    #canvas-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      background-color: var(--cream-alt);
    }

    #canvas-wrap.is-panning { cursor: grabbing; }

    #world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      /* No will-change: transform — avoids a single massive GPU texture that
         overflows mobile VRAM limits and causes straight-line clipping.
         The browser tile-rasterizes dynamically instead (only visible tiles). */
    }

    /* ── Scrap items ── */
    .scrap-item {
      position: absolute;
      transform-origin: center center;
      cursor: pointer;
      user-select: none;
      transition: box-shadow 0.2s ease;
    }

    .scrap-item.is-dragging-item {
      cursor: grabbing;
      z-index: 9999 !important;
      transition: none;
    }

    .scrap-item img {
      display: block;
      border-radius: 2px;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Shadow directly on element — no pseudo-element artifacts */
    .scrap-item {
      border-radius: 2px; /* matches img — so outline follows rounded corners */
      box-shadow: 0 4px 22px rgba(30,30,40,0.22), 0 1px 5px rgba(30,30,40,0.14);
      outline: 2px solid transparent;
      outline-offset: 3px;
      transition: box-shadow 0.2s ease, outline-color 0.2s ease;
    }

    /* Cream outline on hover — blends with canvas background */
    .scrap-item:hover {
      outline-color: var(--cream-alt);
    }

    .scrap-item:hover,
    .scrap-item.is-dragging-item {
      box-shadow: 0 14px 40px rgba(30,30,40,0.28), 0 3px 10px rgba(30,30,40,0.14);
    }

    /* ── Bottom-left description ── */
    #scraps-desc-left {
      position: fixed;
      bottom: 24px;
      left: 28px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: none;
      max-width: 260px;
    }

    #scraps-desc-left span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--n400);
      font-feature-settings: "ss02" on, "ss03" on;
    }

    /* ── Bottom-right hint ── */
    #scraps-desc-right {
      position: fixed;
      bottom: 24px;
      right: 28px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: none;
      text-align: right;
    }

    #scraps-desc-right span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--n400);
      font-feature-settings: "ss02" on, "ss03" on;
    }

    /* Disable hit-testing during canvas pan */
    body.is-panning .scrap-item { pointer-events: none; }

    /* max-width: none prevents any base-css reset shrinking images near container edges */
    .scrap-item img { max-width: none; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    #lb-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(20,20,28,0.92);
      cursor: pointer;
    }

    #lb-frame {
      position: relative;
      z-index: 1;
    }

    #lb-img {
      display: block;
      max-width: 88vw;
      max-height: 88vh;
      border-radius: 2px;
      object-fit: contain;
    }

    #lb-close {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 2;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,251,243,0.12);
      border: 1px solid rgba(255,251,243,0.2);
      border-radius: 4px;
      color: rgba(255,251,243,0.7);
      font-size: 20px;
      cursor: pointer;
      font-family: var(--font-meta);
      font-weight: 300;
      transition: background 0.2s ease, color 0.2s ease;
    }

    #lb-close:hover {
      background: rgba(255,251,243,0.2);
      color: var(--cream);
    }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,251,243,0.1);
      border: 1px solid rgba(255,251,243,0.2);
      border-radius: 4px;
      color: rgba(255,251,243,0.7);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .lb-nav:hover {
      background: rgba(255,251,243,0.18);
      color: var(--cream);
    }

    #lb-prev { left: 20px; }
    #lb-next { right: 20px; }

    #lb-counter {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: var(--font-meta);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,251,243,0.4);
    }

    .site-nav { z-index: 1000; }

    @media (max-width: 640px) {
      #scraps-desc-left  { bottom: 24px; left: 16px; }
      #scraps-desc-right { bottom: 24px; right: 16px; }

      /* Lightbox nav: move to bottom corners alongside counter */
      .lb-nav {
        display: flex;
        width: 40px;
        height: 40px;
        top: auto;
        bottom: 20px;
        transform: none;
      }
      #lb-prev { left: 20px; }
      #lb-next { right: 20px; }
    }
  </style>
</head>
<body>

  <!-- ── CUSTOM CURSOR ── -->
  <div id="cursor"><span id="cursor-label"></span></div>

  <!-- ── OUTSIDE LOGO (desktop) ── -->
  <a href="/" class="nav-logo-outside" aria-label="Home">
    <img src="assets/wordmarks/emil.svg" alt="Emil Blum">
  </a>

  <!-- ── FLOATING NAVIGATION ── -->
  <nav class="site-nav" aria-label="Main navigation">
    <div class="nav-header">
      <a href="/" class="nav-wordmark" aria-label="Home">
        <img src="assets/wordmarks/emil.svg" alt="Emil Blum">
      </a>
      <button class="nav-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <div class="toggle-icon"><span></span><span></span><span></span></div>
        <span class="toggle-label">Menu</span>
      </button>
    </div>
    <div class="nav-links">
      <a href="featured.html"       class="nav-link" data-cursor="View">Featured</a>
      <a href="code.html"           class="nav-link" data-cursor="Explore">Code</a>
      <a href="art.html"            class="nav-link" data-cursor="Look">Art</a>
      <a href="moments-v2.html"     class="nav-link" data-cursor="Wander">Moments</a>
      <a href="scraps-v2.html"      class="nav-link" data-cursor="Browse">Swarf</a>
      <a href="about.html"          class="nav-link" data-cursor="Read">About</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-toggle">Play <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg></button>
        <div class="nav-dropdown-menu">
          <a href="play.html" class="nav-dropdown-item">Ripple Music</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── CANVAS ── -->
  <div id="canvas-wrap">
    <div id="world"></div>
  </div>

  <!-- ── BOTTOM-LEFT DESCRIPTION ── -->
  <div id="scraps-desc-left">
    <span>A selection of visual and</span>
    <span>conceptual experiments left on</span>
    <span>the cutting room floor</span>
  </div>

  <!-- ── BOTTOM-RIGHT HINT ── -->
  <div id="scraps-desc-right">
    <span>Drag canvas to look around</span>
    <span>Click on image to see detail</span>
  </div>

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <div id="lb-backdrop"></div>
    <div id="lb-frame">
      <img id="lb-img" src="" alt="">
    </div>
    <button id="lb-close" aria-label="Close">×</button>
    <button class="lb-nav" id="lb-prev" aria-label="Previous">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
    </button>
    <button class="lb-nav" id="lb-next" aria-label="Next">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg>
    </button>
    <div id="lb-counter" aria-live="polite"></div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── Photos — 36 unique images, no repetition ─────── */
    const PHOTOS = (() => {
      const imgs = [];
      for (let i = 1; i <= 36; i++) {
        const n = String(i).padStart(2, '0');
        const suffix = i <= 3 ? '-Wide' : '';
        imgs.push(`moments-v2-canvas/photos/${n}_About-Pictures${suffix}.png`);
      }
      return imgs;
    })();

    /* ── Viewport-relative world dimensions ─────────── */
    // Desktop (>1024): 2× viewport   Tablet (>640): 3×   Mobile: 5×
    const VW   = window.innerWidth;
    const VH   = window.innerHeight;
    // Tablet and mobile both use 3× — 5× created a world too large relative to image sizes
    const MULT = VW > 1024 ? 2 : 3;

    const WORLD_W = Math.round(VW * MULT);
    const WORLD_H = Math.round(VH * MULT);

    /* ── Canvas state (scale locked at 1) ───────────── */
    const C = {
      tx: 0, ty: 0,
      scale: 1,
      velX: 0, velY: 0,
      panning: false,
      lastX: 0, lastY: 0,
    };

    const DECAY = 0.91;

    /* ── DOM ─────────────────────────────────────────── */
    const canvasWrap = document.getElementById('canvas-wrap');
    const world      = document.getElementById('world');

    /* ── Random (fresh each reload) ─────────────────── */
    function sr() { return Math.random(); }

    /* ── Transform ───────────────────────────────────── */
    function applyTransform() {
      world.style.transform = `translate(${C.tx}px,${C.ty}px)`;
    }

    /* ── Clamp pan so world can't drift fully off screen */
    function clampPan() {
      const minX = VW - WORLD_W;
      const minY = VH - WORLD_H;
      C.tx = Math.min(0, Math.max(minX, C.tx));
      C.ty = Math.min(0, Math.max(minY, C.ty));
    }

    /* ── RAF loop ────────────────────────────────────── */
    function tick() {
      if (!C.panning && Math.hypot(C.velX, C.velY) > 0.15) {
        C.tx += C.velX;
        C.ty += C.velY;
        C.velX *= DECAY;
        C.velY *= DECAY;
        clampPan();
        applyTransform();
      }
      requestAnimationFrame(tick);
    }

    /* ── Item (individual image) drag ────────────────── */
    let itemDragEl    = null;
    let itemDragOffX  = 0;
    let itemDragOffY  = 0;
    let itemDragStartX = 0;
    let itemDragStartY = 0;
    let itemDragMoved  = false;
    const DRAG_THRESHOLD = 6;
    let topZ = 100; // start above max initial z-index (1–31) so first drag always brings item to front
    let activePointers = 0;  // track simultaneous touches to block pinch-pan chaos

    /* Convert screen coords to world coords (scale=1, so direct subtract) */
    function screenToWorld(sx, sy) {
      return { x: sx - C.tx, y: sy - C.ty };
    }

    /* ── Canvas pan events ───────────────────────────── */
    canvasWrap.addEventListener('pointerdown', e => {
      activePointers++;

      // Second finger down: cancel any ongoing pan to prevent pinch wild-scroll
      if (activePointers > 1) {
        if (C.panning) {
          C.panning = false;
          C.velX = C.velY = 0;
          canvasWrap.classList.remove('is-panning');
          document.body.classList.remove('is-panning');
        }
        return;
      }

      const item = e.target.closest('.scrap-item');
      if (item) {
        itemDragEl = item;
        itemDragMoved = false;
        item.classList.add('is-dragging-item');
        item.style.zIndex = ++topZ;

        const world_p = screenToWorld(e.clientX, e.clientY);
        itemDragOffX   = world_p.x - (parseFloat(item.style.left) || 0);
        itemDragOffY   = world_p.y - (parseFloat(item.style.top)  || 0);
        itemDragStartX = e.clientX;
        itemDragStartY = e.clientY;

        item.setPointerCapture(e.pointerId);
        e.stopPropagation();
      } else {
        C.panning = true;
        C.lastX = e.clientX;
        C.lastY = e.clientY;
        C.velX = C.velY = 0;
        canvasWrap.setPointerCapture(e.pointerId);
        canvasWrap.classList.add('is-panning');
        document.body.classList.add('is-panning');
      }
    });

    canvasWrap.addEventListener('pointermove', e => {
      if (activePointers > 1) return;  // ignore moves during multi-touch
      if (itemDragEl) {
        if (!itemDragMoved) {
          const dist = Math.hypot(e.clientX - itemDragStartX, e.clientY - itemDragStartY);
          if (dist < DRAG_THRESHOLD) return;
          itemDragMoved = true;
        }
        const world_p = screenToWorld(e.clientX, e.clientY);
        itemDragEl.style.left = (world_p.x - itemDragOffX) + 'px';
        itemDragEl.style.top  = (world_p.y - itemDragOffY) + 'px';
        return;
      }
      if (!C.panning) return;
      const dx = e.clientX - C.lastX;
      const dy = e.clientY - C.lastY;
      C.tx += dx; C.ty += dy;
      C.velX = dx; C.velY = dy;
      C.lastX = e.clientX;
      C.lastY = e.clientY;
      clampPan();
      applyTransform();
    });

    canvasWrap.addEventListener('pointerup', e => {
      activePointers = Math.max(0, activePointers - 1);
      if (itemDragEl) {
        itemDragEl.classList.remove('is-dragging-item');
        if (!itemDragMoved) {
          openLightbox(parseInt(itemDragEl.dataset.index, 10));
        }
        itemDragEl = null;
        return;
      }
      C.panning = false;
      canvasWrap.classList.remove('is-panning');
      document.body.classList.remove('is-panning');
    });

    canvasWrap.addEventListener('pointercancel', () => {
      activePointers = Math.max(0, activePointers - 1);
      if (itemDragEl) {
        itemDragEl.classList.remove('is-dragging-item');
        itemDragEl = null;
      }
      C.panning = false;
      canvasWrap.classList.remove('is-panning');
      document.body.classList.remove('is-panning');
    });

    function resetView() {
      // Centre the world in the viewport — edges extend beyond screen on all sides
      C.tx = Math.round((VW - WORLD_W) / 2);
      C.ty = Math.round((VH - WORLD_H) / 2);
      C.velX = C.velY = 0;
      applyTransform();
    }

    /* ── Build layout ────────────────────────────────── */
    function buildLayout() {
      // No grid — fully random scatter across the world
      // Padding keeps images from clipping the world edges
      const pad  = Math.round(Math.min(WORLD_W, WORLD_H) * 0.06);
      // On mobile images need to be larger relative to the viewport so they fill well
      const minW = VW > 640 ? Math.round(VW * 0.12) : Math.round(VW * 0.28);
      const maxW = VW > 640 ? Math.round(VW * 0.42) : Math.round(VW * 0.72);

      PHOTOS.forEach((src, i) => {
        const cx  = pad + sr() * (WORLD_W - pad * 2);
        const cy  = pad + sr() * (WORLD_H - pad * 2);
        // Bimodal rotation: either gently tilted or sharply rotated — avoids uniform spread
        const bigRot = sr() > 0.55;
        const rot = bigRot
          ? (sr() < 0.5 ? -1 : 1) * (25 + sr() * 45)   // ±25–70°
          : (sr() - 0.5) * 24;                            // ±12° gentle
        // Trimodal size: small / medium / large clusters
        const sizeTier = sr();
        const w = sizeTier < 0.3
          ? Math.round(minW + sr() * (minW * 0.8))        // small
          : sizeTier < 0.7
          ? Math.round(minW * 1.8 + sr() * (maxW - minW * 1.8))  // medium
          : Math.round(maxW * 0.8 + sr() * maxW * 0.2);           // large

        const item = document.createElement('div');
        item.className = 'scrap-item';
        item.dataset.index = i;
        item.style.cssText = `
          left: ${cx}px;
          top:  ${cy}px;
          transform: translate(-50%, -50%) rotate(${rot}deg);
          z-index: ${Math.round(sr() * 30) + 1};
        `;

        const img = document.createElement('img');
        img.src = src;
        img.width = w;
        img.draggable = false;
        img.loading = 'lazy';
        img.alt = `Scrap ${i + 1}`;

        item.appendChild(img);
        world.appendChild(item);
      });

      world.style.width  = WORLD_W + 'px';
      world.style.height = WORLD_H + 'px';
    }

    /* ── Lightbox ────────────────────────────────────── */
    let lbIndex = 0;
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');

    function openLightbox(i) {
      lbIndex = i;
      lbImg.src = PHOTOS[i];
      lbCounter.textContent = `${String(i+1).padStart(2,'0')} / ${String(PHOTOS.length).padStart(2,'0')}`;
      lightbox.classList.add('is-open');
    }

    function closeLightbox() { lightbox.classList.remove('is-open'); }

    function prevPhoto() {
      lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length;
      lbImg.src = PHOTOS[lbIndex];
      lbCounter.textContent = `${String(lbIndex+1).padStart(2,'0')} / ${String(PHOTOS.length).padStart(2,'0')}`;
    }

    function nextPhoto() {
      lbIndex = (lbIndex + 1) % PHOTOS.length;
      lbImg.src = PHOTOS[lbIndex];
      lbCounter.textContent = `${String(lbIndex+1).padStart(2,'0')} / ${String(PHOTOS.length).padStart(2,'0')}`;
    }

    document.getElementById('lb-close').addEventListener('click',   closeLightbox);
    document.getElementById('lb-backdrop').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click',     prevPhoto);
    document.getElementById('lb-next').addEventListener('click',     nextPhoto);

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('is-open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    });

    /* ── Init ────────────────────────────────────────── */
    buildLayout();
    resetView();
    tick();

  })();
  </script>

  <script src="js/nav.js"></script>
  <script src="js/transitions.js"></script>

</body>
</html>

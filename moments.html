  <style>
    /* ── Page header ──────────────────────────────────── */
    .moments-header {
      padding-top: 140px;
      padding-bottom: 64px;
    }

    .moments-header h1 {
      max-width: 680px;
      margin-top: 20px;
    }

    /* ── Masonry grid ─────────────────────────────────── */
    .photo-grid {
      column-count: 3;
      column-gap: 12px;
      padding-bottom: 120px;
    }

    @media (max-width: 900px) {
      .photo-grid { column-count: 2; }
    }

    @media (max-width: 520px) {
      .photo-grid { column-count: 1; }
    }

    /* ── Photo item ───────────────────────────────────── */
    .photo-item {
      break-inside: avoid;
      margin-bottom: 12px;
      display: block;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .photo-item img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* greyscale → colour on hover (uses base.css classes) */
    .photo-item.hover-color img {
      transition: filter 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .photo-item.hover-color:hover img {
      transform: scale(1.02);
    }

    /* ── Lightbox overlay ─────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(30, 30, 40, 0.95);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 88vw;
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      box-shadow: 0 40px 120px rgba(0,0,0,0.6);
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 32px;
      width: 44px;
      height: 44px;
      background: rgba(255, 251, 243, 0.08);
      border: 1px solid rgba(255, 251, 243, 0.15);
      border-radius: 50%;
      cursor: pointer;
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-size: 20px;
      line-height: 1;
    }

    .lightbox-close:hover {
      background: rgba(255, 251, 243, 0.15);
    }
  </style>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close lightbox">&#x2715;</button>
    <div class="lightbox-inner">

    </div>

  <!-- Lightbox JS -->
  <script>
    const lightbox     = document.getElementById('lightbox');
    const lightboxImg  = document.getElementById('lightbox-img');
    const closeBtn     = document.getElementById('lightbox-close');
    const photoItems   = document.querySelectorAll('.photo-item');

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || '';
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { lightboxImg.src = ''; }, 350);
    }

    photoItems.forEach(item => {
      item.addEventListener('click', () => {
        openLightbox(item.dataset.src, item.querySelector('img').alt);
      });
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openLightbox(item.dataset.src, item.querySelector('img').alt);
        }
      });
    });

    closeBtn.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });
  </script>

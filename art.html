<head>

  <style>

    /* ── Page base — dark theme ───────────────────────────── */
    body {
      background: #0e1628;
      overflow: auto;
    }

    /* ── Grid page layout ─────────────────────────────────── */
    .art-grid {
      padding-top: 140px;
      padding-bottom: 80px;
    }

    .art-grid-header {
      margin-bottom: 48px;
    }

    .art-grid-header .t-label {
      color: rgba(255, 251, 243, 0.4);
    }
    /* Override the ::after line colour for the section label */
    .art-grid-header .t-label::after {
      background: rgba(255, 251, 243, 0.12);
    }

    .art-grid-header h1 {
      color: var(--cream);
      max-width: 640px;
      margin-top: 16px;
    }

    /* ── Masonry columns ──────────────────────────────────── */
    .art-masonry {
      column-count: 3;
      column-gap: 10px;
    }
    @media (max-width: 720px)  { .art-masonry { column-count: 2; } }
    @media (max-width: 480px)  { .art-masonry { column-count: 1; } }

    /* ── Grid items ───────────────────────────────────────── */
    .art-grid-item {
      break-inside: avoid;
      margin-bottom: 10px;
      cursor: pointer;
      overflow: hidden;
      border-radius: 3px;
      position: relative;
      opacity: 0;
      transform: translateY(36px);
      transition:
        opacity 0.75s cubic-bezier(0.215, 0.61, 0.355, 1),
        transform 0.75s cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    .art-grid-item.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .art-grid-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .art-grid-item:hover img { transform: scale(1.02); }

    /* Placeholder tile — dark-themed */
    .art-grid-tile {
      width: 100%;
      background: rgba(255, 251, 243, 0.05);
      border: 1px solid rgba(255, 251, 243, 0.08);
      transition: background 0.2s ease;
    }
    .art-grid-item:hover .art-grid-tile {
      background: rgba(255, 251, 243, 0.09);
    }

    /* ── Lightbox ─────────────────────────────────────────── */
    .art-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .art-lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lb-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(20, 20, 28, 0.94);
      cursor: pointer;
    }

    .lb-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 88vw;
    }

    .lb-img {
      display: block;
      max-width: 80vw;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 3px;
    }

    .lb-placeholder {
      width: clamp(200px, 50vw, 600px);
      aspect-ratio: 4 / 3;
      background: rgba(255, 251, 243, 0.04);
      border: 1px solid rgba(255, 251, 243, 0.1);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-placeholder span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 251, 243, 0.2);
    }

    .lb-caption { text-align: center; }
    .lb-caption-title {
      font-size: 14px;
      color: rgba(255, 251, 243, 0.75);
      margin-bottom: 4px;
    }
    .lb-caption-meta {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 251, 243, 0.3);
    }

    .lb-close {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 2;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 251, 243, 0.1);
      border: 1px solid rgba(255, 251, 243, 0.2);
      border-radius: 4px;
      color: rgba(255, 251, 243, 0.7);
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lb-close:hover {
      background: rgba(255, 251, 243, 0.18);
      color: var(--cream);
    }

    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 251, 243, 0.1);
      border: 1px solid rgba(255, 251, 243, 0.2);
      border-radius: 4px;
      color: rgba(255, 251, 243, 0.7);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .lb-arrow:hover {
      background: rgba(255, 251, 243, 0.18);
      color: var(--cream);
    }
    .lb-arrow.prev { left: 20px; }
    .lb-arrow.next { right: 20px; }

    /* ── Footer — dark-styled ─────────────────────────────── */
    .site-footer {
      border-top-color: rgba(255, 251, 243, 0.08);
    }
    .site-footer .footer-link,
    .site-footer .footer-copy {
      color: rgba(255, 251, 243, 0.3);
    }
    .site-footer .footer-link:hover {
      color: rgba(255, 251, 243, 0.75);
    }

    @media (max-width: 600px) {
      .lb-img { max-width: 92vw; max-height: 74vh; }

      .lb-arrow {
        top: auto;
        bottom: 20px;
        transform: none;
      }

      .lb-caption {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        width: max-content;
        max-width: 58vw;
        z-index: 3;
        pointer-events: none;
      }
      .lb-caption-title { font-size: 12px; }
      .lb-caption-meta  { display: none; }
    }

  </style>
</head>

  <script>
    'use strict';

    /* ── Artwork data ──────────────────────────────────────
       Drop real image paths into `src` when ready.
       aspectW/H drive placeholder proportions.
    ─────────────────────────────────────────────────────── */
    const BASE = 'assets/art-placeholders/';
    const artworks = [
      { src: BASE + '01_Art-placeholder.jpg', alt: 'Placeholder 01', title: 'Untitled 01', meta: 'Placeholder · 2024', aspectW: 16, aspectH: 9  },
      { src: BASE + '02_Art-placeholder.jpg', alt: 'Placeholder 02', title: 'Untitled 02', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '03_Art-placeholder.jpg', alt: 'Placeholder 03', title: 'Untitled 03', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '04_Art-placeholder.jpg', alt: 'Placeholder 04', title: 'Untitled 04', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '05_Art-placeholder.jpg', alt: 'Placeholder 05', title: 'Untitled 05', meta: 'Placeholder · 2024', aspectW: 1,  aspectH: 1  },
      { src: BASE + '06_Art-placeholder.jpg', alt: 'Placeholder 06', title: 'Untitled 06', meta: 'Placeholder · 2024', aspectW: 16, aspectH: 9  },
      { src: BASE + '07_Art-placeholder.jpg', alt: 'Placeholder 07', title: 'Untitled 07', meta: 'Placeholder · 2024', aspectW: 16, aspectH: 9  },
      { src: BASE + '08_Art-placeholder.jpg', alt: 'Placeholder 08', title: 'Untitled 08', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '09_Art-placeholder.jpg', alt: 'Placeholder 09', title: 'Untitled 09', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '10_Art-placeholder.jpg', alt: 'Placeholder 10', title: 'Untitled 10', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '11_Art-placeholder.jpg', alt: 'Placeholder 11', title: 'Untitled 11', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '12_Art-placeholder.jpg', alt: 'Placeholder 12', title: 'Untitled 12', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '13_Art-placeholder.jpg', alt: 'Placeholder 13', title: 'Untitled 13', meta: 'Placeholder · 2024', aspectW: 1,  aspectH: 1  },
      { src: BASE + '14_Art-placeholder.jpg', alt: 'Placeholder 14', title: 'Untitled 14', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '16_Art-placeholder.jpg', alt: 'Placeholder 16', title: 'Untitled 16', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
      { src: BASE + '17_Art-placeholder.jpg', alt: 'Placeholder 17', title: 'Untitled 17', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 2  },
      { src: BASE + '18_Art-placeholder.jpg', alt: 'Placeholder 18', title: 'Untitled 18', meta: 'Placeholder · 2024', aspectW: 21, aspectH: 10 },
      { src: BASE + '19_Art-placeholder.jpg', alt: 'Placeholder 19', title: 'Untitled 19', meta: 'Placeholder · 2024', aspectW: 3,  aspectH: 4  },
    ];

    /* ── State ─────────────────────────────────────────── */
    let lbIndex = 0;

    /* ── Build: grid ───────────────────────────────────── */
    function buildGrid() {
      const masonry = document.getElementById('artMasonry');

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
            setTimeout(() => { entry.target.style.transitionDelay = '0s'; }, 800);
          }
        });
      }, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });

      artworks.forEach((art, i) => {
        const item = document.createElement('div');
        item.className = 'art-grid-item';
        item.setAttribute('tabindex', '0');
        item.setAttribute('role', 'button');
        item.setAttribute('aria-label', art.title);
        // Staggered delay by column index (3 columns)
        item.style.transitionDelay = `${(i % 3) * 0.07}s`;

        if (art.src) {
          const img = document.createElement('img');
          img.src = art.src;
          img.alt = art.alt;
          img.loading = 'lazy';
          item.appendChild(img);
        } else {
          const tile = document.createElement('div');
          tile.className = 'art-grid-tile';
          tile.style.aspectRatio = `${art.aspectW} / ${art.aspectH}`;
          item.appendChild(tile);
        }

        item.addEventListener('click', () => openLightbox(i));
        item.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(i); }
        });

        masonry.appendChild(item);
        observer.observe(item);
      });
    }

    /* ── Lightbox ──────────────────────────────────────── */
    function openLightbox(index) {
      lbIndex = ((index % artworks.length) + artworks.length) % artworks.length;
      const art = artworks[lbIndex];
      const lb  = document.getElementById('artLightbox');
      const img = document.getElementById('lbImg');
      const placeholder = document.getElementById('lbPlaceholder');

      if (art.src) {
        img.src = art.src;
        img.alt = art.alt;
        img.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.style.aspectRatio = `${art.aspectW} / ${art.aspectH}`;
      }

      document.getElementById('lbCaptionTitle').textContent = art.title;
      document.getElementById('lbCaptionMeta').textContent  = art.meta;
      lb.classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('artLightbox').classList.remove('open');
      setTimeout(() => { document.getElementById('lbImg').src = ''; }, 350);
    }

    function shiftLightbox(dir) { openLightbox(lbIndex + dir); }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbBackdrop').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => shiftLightbox(-1));
    document.getElementById('lbNext').addEventListener('click', () => shiftLightbox(1));

    document.addEventListener('keydown', e => {
      const lb = document.getElementById('artLightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  shiftLightbox(-1);
      if (e.key === 'ArrowRight') shiftLightbox(1);
    });

    /* ── Init ──────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', buildGrid);
  </script>

</body>
